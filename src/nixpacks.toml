[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc", "gcc-unwrapped"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r railway_requirements_fixed.txt --no-cache-dir"
]

[phases.build]
cmds = ["echo 'Build completed'"]

[start]
cmd = "python -m uvicorn app:app --host 0.0.0.0 --port $PORT" 
