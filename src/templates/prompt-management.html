<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EORA AI System - 프롬프트 관리</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .prompt-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .prompt-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .prompt-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .prompt-type {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
        }

        .prompt-content {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prompt-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-edit {
            background: #28a745;
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 프롬프트 관리</h1>
            <p>EORA AI System의 모든 AI 프롬프트를 통합 관리합니다</p>
        </div>

        <div id="message-container"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-prompts">0</div>
                <div class="stat-label">총 프롬프트</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-ais">0</div>
                <div class="stat-label">AI 개수</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-categories">0</div>
                <div class="stat-label">카테고리</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadPrompts()">🔄 새로고침</button>
            <button class="btn btn-secondary" onclick="showAddModal()">➕ 새 프롬프트</button>
            <button class="btn btn-secondary" onclick="exportPrompts()">📤 내보내기</button>
            <button class="btn btn-secondary" onclick="importPrompts()">📥 가져오기</button>
            <a href="/admin" class="btn btn-secondary">🏠 관리자 페이지</a>
        </div>

        <div id="prompts-container" class="prompt-grid">
            <div class="loading">프롬프트를 불러오는 중...</div>
        </div>
    </div>

    <!-- 프롬프트 편집 모달 -->
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">프롬프트 편집</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="promptForm">
                <div class="form-group">
                    <label for="aiName">AI 이름</label>
                    <input type="text" id="aiName" name="aiName" required>
                </div>
                <div class="form-group">
                    <label for="category">카테고리</label>
                    <select id="category" name="category" required>
                        <option value="system">System</option>
                        <option value="role">Role</option>
                        <option value="guide">Guide</option>
                        <option value="format">Format</option>
                        <option value="content">Content</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="promptContent">프롬프트 내용</label>
                    <textarea id="promptContent" name="promptContent" required></textarea>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let promptsData = [];

        // 페이지 로드 시 프롬프트 불러오기
        document.addEventListener('DOMContentLoaded', function () {
            loadPrompts();
        });

        // 프롬프트 불러오기
        async function loadPrompts() {
            try {
                const response = await fetch('/api/prompts');
                const data = await response.json();

                if (response.ok) {
                    promptsData = data.prompts || [];
                    displayPrompts(promptsData);
                    updateStats(promptsData);
                    showMessage('프롬프트를 성공적으로 불러왔습니다.', 'success');
                } else {
                    throw new Error(data.detail || '프롬프트를 불러오는데 실패했습니다.');
                }
            } catch (error) {
                console.error('프롬프트 로딩 오류:', error);
                showMessage('프롬프트를 불러오는데 실패했습니다: ' + error.message, 'error');
            }
        }

        // 프롬프트 표시
        function displayPrompts(prompts) {
            const container = document.getElementById('prompts-container');

            if (!prompts || prompts.length === 0) {
                container.innerHTML = '<div class="loading">프롬프트가 없습니다.</div>';
                return;
            }

            container.innerHTML = prompts.map(prompt => `
                <div class="prompt-card">
                    <div class="prompt-header">
                        <div class="prompt-title">${prompt.ai_name}</div>
                        <div class="prompt-type">${prompt.category}</div>
                    </div>
                    <div class="prompt-content">${prompt.content.substring(0, 150)}${prompt.content.length > 150 ? '...' : ''}</div>
                    <div class="prompt-actions">
                        <button class="btn btn-small btn-edit" onclick="editPrompt('${prompt.ai_name}', '${prompt.category}')">편집</button>
                        <button class="btn btn-small btn-delete" onclick="deletePrompt('${prompt.ai_name}', '${prompt.category}')">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        // 통계 업데이트
        function updateStats(prompts) {
            const uniqueAIs = new Set(prompts.map(p => p.ai_name));
            const uniqueCategories = new Set(prompts.map(p => p.category));

            document.getElementById('total-prompts').textContent = prompts.length;
            document.getElementById('total-ais').textContent = uniqueAIs.size;
            document.getElementById('total-categories').textContent = uniqueCategories.size;
        }

        // 메시지 표시
        function showMessage(message, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="${type}">${message}</div>`;

            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // 모달 표시
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '새 프롬프트 추가';
            document.getElementById('promptForm').reset();
            document.getElementById('promptModal').style.display = 'block';
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('promptModal').style.display = 'none';
        }

        // 프롬프트 편집
        function editPrompt(aiName, category) {
            const prompt = promptsData.find(p => p.ai_name === aiName && p.category === category);
            if (prompt) {
                document.getElementById('modalTitle').textContent = '프롬프트 편집';
                document.getElementById('aiName').value = prompt.ai_name;
                document.getElementById('category').value = prompt.category;
                document.getElementById('promptContent').value = prompt.content;
                document.getElementById('promptModal').style.display = 'block';
            }
        }

        // 프롬프트 삭제
        async function deletePrompt(aiName, category) {
            if (!confirm(`정말로 ${aiName}의 ${category} 프롬프트를 삭제하시겠습니까?`)) {
                return;
            }

            try {
                const response = await fetch('/api/prompts/delete-category', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ai_name: aiName,
                        category: category
                    })
                });

                if (response.ok) {
                    showMessage('프롬프트가 삭제되었습니다.', 'success');
                    loadPrompts();
                } else {
                    const data = await response.json();
                    throw new Error(data.detail || '삭제에 실패했습니다.');
                }
            } catch (error) {
                console.error('삭제 오류:', error);
                showMessage('삭제에 실패했습니다: ' + error.message, 'error');
            }
        }

        // 프롬프트 저장
        document.getElementById('promptForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(e.target);
            const promptData = {
                ai_name: formData.get('aiName'),
                category: formData.get('category'),
                content: formData.get('promptContent')
            };

            try {
                const response = await fetch('/api/prompts/category', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(promptData)
                });

                if (response.ok) {
                    showMessage('프롬프트가 저장되었습니다.', 'success');
                    closeModal();
                    loadPrompts();
                } else {
                    const data = await response.json();
                    throw new Error(data.detail || '저장에 실패했습니다.');
                }
            } catch (error) {
                console.error('저장 오류:', error);
                showMessage('저장에 실패했습니다: ' + error.message, 'error');
            }
        });

        // 프롬프트 내보내기
        function exportPrompts() {
            const dataStr = JSON.stringify(promptsData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'prompts_export.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        // 프롬프트 가져오기
        function importPrompts() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            // 여기에 가져오기 로직 구현
                            showMessage('가져오기 기능은 개발 중입니다.', 'error');
                        } catch (error) {
                            showMessage('파일 형식이 올바르지 않습니다.', 'error');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function (event) {
            const modal = document.getElementById('promptModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
