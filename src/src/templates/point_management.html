<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>포인트 관리</title>
</head>

<body>
    <nav>
        <a href="/admin">관리자 홈</a> |
        <a href="/dashboard">대시보드</a> |
        <a href="/point-management">포인트 관리</a> |
        <a href="/memory-management">기억 관리자</a> |
        <a href="/storage-management">저장소 관리</a>
    </nav>
    <h1>포인트 관리</h1>
    <button onclick="addPoint()">➕ 포인트 추가</button>
    <table border="1" id="point-table">
        <thead>
            <tr>
                <th>사용자</th>
                <th>포인트</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button onclick="savePoint()">💾 저장</button>
    <script>
        function addPoint() {
            const tbody = document.getElementById('point-table').querySelector('tbody');
            const row = document.createElement('tr');
            row.innerHTML = `<td contenteditable="true"></td><td contenteditable="true"></td><td><button onclick="this.closest('tr').remove()">삭제</button></td>`;
            tbody.appendChild(row);
        }
        function savePoint() {
            alert('저장 기능은 추후 구현 예정입니다.');
        }
    </script>
</body>

</html>
