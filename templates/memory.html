<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EORA AI System - 기억 관리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f3fb;
            color: #ececf1;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.10);
            padding: 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #4a4b53;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ececf1;
        }

        .back-btn {
            padding: 10px 20px;
            background: #10a37f;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background: #0d8a6f;
        }

        .memory-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #40414f;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #565869;
        }

        .stat-title {
            font-size: 14px;
            color: #8e8ea0;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #ececf1;
        }

        .memory-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 20px;
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 6px;
            color: #ececf1;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #565869;
        }

        .control-btn.primary {
            background: #10a37f;
            border-color: #10a37f;
        }

        .control-btn.primary:hover {
            background: #0d8a6f;
        }

        .memory-list {
            background: #40414f;
            border-radius: 8px;
            border: 1px solid #565869;
            overflow: hidden;
        }

        .memory-header {
            padding: 15px 20px;
            background: #343541;
            border-bottom: 1px solid #565869;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memory-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .search-box {
            padding: 8px 12px;
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 4px;
            color: #ececf1;
            font-size: 14px;
            width: 250px;
        }

        .search-box:focus {
            outline: none;
            border-color: #10a37f;
        }

        .memory-items {
            max-height: 500px;
            overflow-y: auto;
        }

        .memory-item {
            padding: 15px 20px;
            border-bottom: 1px solid #565869;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .memory-item:hover {
            background: #343541;
        }

        .memory-item:last-child {
            border-bottom: none;
        }

        .memory-title {
            font-size: 14px;
            font-weight: 500;
            color: #ececf1;
            margin-bottom: 5px;
        }

        .memory-content {
            font-size: 13px;
            color: #8e8ea0;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .memory-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #8e8ea0;
        }

        .memory-type {
            background: #10a37f;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8ea0;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8ea0;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #565869;
            border-radius: 50%;
            border-top-color: #10a37f;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .memory-controls {
                flex-direction: column;
            }

            .control-btn {
                text-align: center;
            }

            .search-box {
                width: 100%;
            }
        }

        .delete-btn {
            background: #e84a5f;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #b71c1c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 기억 관리</h1>
            <button class="back-btn" onclick="window.location.href='/dashboard'">대시보드로 돌아가기</button>
        </div>

        <div class="memory-stats">
            <div class="stat-card">
                <div class="stat-title">총 기억 수</div>
                <div class="stat-value" id="totalMemories">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">최근 기억</div>
                <div class="stat-value" id="recentMemories">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">기억 유형</div>
                <div class="stat-value" id="memoryTypes">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">기억 점수</div>
                <div class="stat-value" id="memoryScore">0</div>
            </div>
        </div>

        <div class="memory-controls">
            <button class="control-btn primary" onclick="refreshMemories()">새로고침</button>
            <button class="control-btn" onclick="exportMemories()">내보내기</button>
            <button class="control-btn" onclick="clearOldMemories()">오래된 기억 정리</button>
            <button class="control-btn" onclick="optimizeMemories()">기억 최적화</button>
        </div>

        <div class="memory-list">
            <div class="memory-header">
                <h3>기억 목록</h3>
                <input type="text" class="search-box" id="searchBox" placeholder="기억 검색..." onkeyup="searchMemories()">
            </div>
            <div class="memory-items" id="memoryItems">
                <div class="loading">기억을 불러오는 중...</div>
            </div>
        </div>
    </div>

    <script>
        // 페이지 로드 시 로그인 상태 확인
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadMemoryData();
        });

        // 로그인 상태 확인
        function checkLoginStatus() {
            const userEmail = localStorage.getItem('user_email');
            if (!userEmail) {
                alert('로그인이 필요합니다.');
                window.location.href = '/';
                return;
            }
        }

        // 기억 데이터 로드
        function loadMemoryData() {
            // 기억 통계 로드
            fetch('/api/aura/memory/stats')
                .then(response => response.json())
                .then(data => {
                    updateMemoryStats(data);
                })
                .catch(error => {
                    console.error('기억 통계 로드 오류:', error);
                });

            // 기억 목록 로드
            fetch('/api/aura/recall')
                .then(response => response.json())
                .then(data => {
                    updateMemoryList(data.aura_memories || []);
                })
                .catch(error => {
                    console.error('기억 목록 로드 오류:', error);
                });
        }

        // 기억 통계 업데이트
        function updateMemoryStats(data) {
            const totalMemories = document.getElementById('totalMemories');
            const recentActivity = document.getElementById('recentMemories');
            
            if (totalMemories) {
                totalMemories.textContent = data.total_memories || 0;
            }
            if (recentActivity) {
                recentActivity.textContent = data.recent_activity || 0;
            }
        }

        // 기억 목록 업데이트
        function updateMemoryList(memories) {
            const memoryItems = document.querySelector('.memory-items');
            if (!memoryItems) return;

            if (memories.length === 0) {
                memoryItems.innerHTML = '<div class="memory-item"><p style="text-align: center; color: #8e8ea0;">저장된 기억이 없습니다.</p></div>';
                return;
            }

            const memoryHTML = memories.map((memory, index) => `
                <div class="memory-item" onclick="viewMemory(${index})">
                    <div class="memory-title">기억 ${index + 1}</div>
                    <div class="memory-content">${memory}</div>
                    <div class="memory-meta">
                        <span class="memory-type">자동 저장</span>
                        <span class="memory-date">방금 전</span>
                    </div>
                </div>
            `).join('');

            memoryItems.innerHTML = memoryHTML;
        }

        // 기억 보기
        function viewMemory(index) {
            alert(`기억 ${index + 1}을 확인합니다.`);
        }

        // 기억 저장
        function saveMemory() {
            const memoryText = prompt('저장할 기억을 입력하세요:');
            if (memoryText) {
                fetch('/api/aura/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: memoryText,
                        type: 'manual'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    alert('기억이 저장되었습니다.');
                    loadMemoryData(); // 목록 새로고침
                })
                .catch(error => {
                    console.error('기억 저장 오류:', error);
                    alert('기억 저장에 실패했습니다.');
                });
            }
        }

        // 기억 삭제
        function deleteMemory() {
            if (confirm('모든 기억을 삭제하시겠습니까?')) {
                alert('기억 삭제 기능은 구현 예정입니다.');
            }
        }

        // 기억 내보내기
        function exportMemory() {
            alert('기억 내보내기 기능은 구현 예정입니다.');
        }

        // 검색 기능
        function searchMemory() {
            const searchTerm = document.getElementById('searchBox').value;
            alert(`"${searchTerm}" 검색 기능은 구현 예정입니다.`);
        }
    </script>
</body>
</html>
