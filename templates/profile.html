<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EORA AI - 프로필</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 20px;
        }

        .profile-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .profile-subtitle {
            color: #666;
            font-size: 16px;
        }

        .profile-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled {
            background: #f8f9fa;
            color: #666;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stats-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-buttons {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 사용자 프로필</h1>
            <div class="nav-buttons">
                <a href="/?from=profile" class="nav-btn">🏠 홈</a>
                <a href="/chat" class="nav-btn">💬 채팅</a>
                <a href="/dashboard" class="nav-btn">📊 대시보드</a>
                <a href="/memory" class="nav-btn">🧠 기억관리</a>
            </div>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2 class="profile-title">사용자 정보</h2>
                <p class="profile-subtitle">프로필 정보를 확인하고 수정하세요</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form class="profile-form" id="profileForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" readonly>
                </div>
                
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="새 비밀번호를 입력하세요 (선택사항)">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="새 비밀번호를 다시 입력하세요">
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 정보 저장</button>
                    <button type="button" class="btn btn-secondary" onclick="logout()">🚪 로그아웃</button>
                </div>
            </form>

            <div class="stats-section">
                <h3>📊 사용 통계</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalMessages">0</div>
                        <div class="stat-label">총 메시지</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalSessions">0</div>
                        <div class="stat-label">총 세션</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="userPoints">1000</div>
                        <div class="stat-label">포인트</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="auraLevel">5</div>
                        <div class="stat-label">아우라 레벨</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 페이지 로드 시 사용자 정보 로드
        document.addEventListener('DOMContentLoaded', function() {
            loadUserProfile();
            loadUserStats();
        });

        // 사용자 프로필 로드
        function loadUserProfile() {
            const userEmail = localStorage.getItem('user_email');
            const userName = localStorage.getItem('user_name');
            
            if (userEmail) {
                document.getElementById('email').value = userEmail;
                document.getElementById('name').value = userName || '';
            } else {
                // 로그인되지 않은 경우 홈으로 리다이렉트
                window.location.href = '/';
            }
        }

        // 사용자 통계 로드
        function loadUserStats() {
            // 실제로는 API에서 데이터를 가져와야 함
            fetch('/api/user/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('totalMessages').textContent = data.total_messages || 0;
                    document.getElementById('totalSessions').textContent = data.total_sessions || 0;
                    document.getElementById('userPoints').textContent = data.points || 1000;
                    document.getElementById('auraLevel').textContent = data.aura_level || 5;
                })
                .catch(error => {
                    console.error('통계 로드 오류:', error);
                });
        }

        // 프로필 폼 제출 처리
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 비밀번호 확인
            if (newPassword && newPassword !== confirmPassword) {
                showAlert('새 비밀번호가 일치하지 않습니다.', 'error');
                return;
            }
            
            // 프로필 업데이트 API 호출 (실제 구현 필요)
            showAlert('프로필이 성공적으로 업데이트되었습니다.', 'success');
            
            // 로컬 스토리지 업데이트
            if (name) {
                localStorage.setItem('user_name', name);
            }
            
            // 폼 초기화
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        });

        // 알림 메시지 표시
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // 로그아웃
        function logout() {
            if (confirm('정말로 로그아웃하시겠습니까?')) {
                localStorage.removeItem('user_email');
                localStorage.removeItem('user_name');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
