<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EORA AI System - 관리자</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .admin-header {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .admin-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .admin-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .admin-content {
            padding: 30px;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 16px;
            color: #666;
        }

        .data-table {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .data-table h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 12px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .action-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }

        .action-btn:hover {
            background: #5a6fd8;
        }

        .action-btn.danger {
            background: #e74c3c;
        }

        .action-btn.danger:hover {
            background: #c0392b;
        }

        @media (max-width: 768px) {
            .admin-content {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .admin-nav {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="user-info">
                <span id="user-email">관리자</span>
                <button class="back-btn" onclick="goBack()">뒤로가기</button>
            </div>
            <h1>🔧 EORA AI 관리자</h1>
            <p>시스템 관리 및 모니터링</p>
        </div>

        <div class="admin-content">
            <div class="admin-nav">
                <button class="nav-btn active" onclick="showSection('overview')">📊 개요</button>
                <button class="nav-btn" onclick="showSection('users')">👥 사용자 관리</button>
                <button class="nav-btn" onclick="showSection('points')">💰 포인트 관리</button>
                <button class="nav-btn" onclick="showSection('system')">⚙️ 시스템</button>
            </div>

            <!-- 개요 섹션 -->
            <div id="overview-section" class="admin-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-number" id="total-users">0</div>
                        <div class="stat-label">총 사용자</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-number" id="total-points">0</div>
                        <div class="stat-label">총 포인트</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💬</div>
                        <div class="stat-number" id="total-conversations">0</div>
                        <div class="stat-label">총 대화</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div class="stat-number" id="active-users">0</div>
                        <div class="stat-label">활성 사용자</div>
                    </div>
                </div>
            </div>

            <!-- 사용자 관리 섹션 -->
            <div id="users-section" class="admin-section">
                <div class="data-table">
                    <h3>👥 사용자 목록</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>이메일</th>
                                <th>가입일</th>
                                <th>마지막 로그인</th>
                                <th>상태</th>
                                <th>포인트</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <tr>
                                <td colspan="7" style="text-align: center;">로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 포인트 관리 섹션 -->
            <div id="points-section" class="admin-section">
                <div class="data-table">
                    <h3>💰 포인트 현황</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>사용자</th>
                                <th>현재 포인트</th>
                                <th>총 획득</th>
                                <th>총 사용</th>
                                <th>마지막 업데이트</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-body">
                            <tr>
                                <td colspan="6" style="text-align: center;">로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 시스템 섹션 -->
            <div id="system-section" class="admin-section">
                <div class="data-table">
                    <h3>⚙️ 시스템 상태</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>항목</th>
                                <th>상태</th>
                                <th>설명</th>
                            </tr>
                        </thead>
                        <tbody id="system-table-body">
                            <tr>
                                <td>MongoDB 연결</td>
                                <td id="mongodb-status">확인 중...</td>
                                <td>데이터베이스 연결 상태</td>
                            </tr>
                            <tr>
                                <td>GPT-4o API</td>
                                <td id="gpt-status">확인 중...</td>
                                <td>OpenAI API 연결 상태</td>
                            </tr>
                            <tr>
                                <td>서버 상태</td>
                                <td id="server-status">확인 중...</td>
                                <td>웹 서버 상태</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 권한 검증
        async function checkAdminPermission() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = '/login';
                    return false;
                }

                const response = await fetch('/api/user/info', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    document.getElementById('user-email').textContent = userData.email;
                    
                    if (!userData.is_admin) {
                        alert('관리자 권한이 필요합니다.');
                        window.location.href = '/dashboard';
                        return false;
                    }
                    return true;
                } else {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return false;
                }
            } catch (error) {
                console.error('권한 검증 오류:', error);
                window.location.href = '/login';
                return false;
            }
        }

        // 섹션 전환
        function showSection(sectionName) {
            // 모든 섹션 숨기기
            document.querySelectorAll('.admin-section').forEach(section => {
                section.classList.remove('active');
            });
            
            // 모든 네비게이션 버튼 비활성화
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 선택된 섹션과 버튼 활성화
            document.getElementById(`${sectionName}-section`).classList.add('active');
            event.target.classList.add('active');
            
            // 섹션별 데이터 로드
            switch(sectionName) {
                case 'overview':
                    loadOverview();
                    break;
                case 'users':
                    loadUsers();
                    break;
                case 'points':
                    loadPoints();
                    break;
                case 'system':
                    loadSystemStatus();
                    break;
            }
        }

        // 개요 데이터 로드
        async function loadOverview() {
            try {
                const token = localStorage.getItem('auth_token');
                const response = await fetch('/api/admin/overview', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('total-users').textContent = data.total_users || 0;
                    document.getElementById('total-points').textContent = data.total_points || 0;
                    document.getElementById('total-conversations').textContent = data.total_conversations || 0;
                    document.getElementById('active-users').textContent = data.active_users || 0;
                }
            } catch (error) {
                console.error('개요 로드 오류:', error);
            }
        }

        // 사용자 목록 로드
        async function loadUsers() {
            try {
                const token = localStorage.getItem('auth_token');
                const response = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const users = await response.json();
                    const tbody = document.getElementById('users-table-body');
                    
                    if (users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">사용자가 없습니다.</td></tr>';
                    } else {
                        tbody.innerHTML = users.map(user => `
                            <tr>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                <td>${user.last_login ? new Date(user.last_login).toLocaleDateString() : '없음'}</td>
                                <td>${user.status}</td>
                                <td>${user.points || 0}</td>
                                <td>
                                    <button class="action-btn" onclick="editUser('${user.user_id}')">수정</button>
                                    <button class="action-btn danger" onclick="deleteUser('${user.user_id}')">삭제</button>
                                </td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('사용자 목록 로드 오류:', error);
            }
        }

        // 포인트 현황 로드
        async function loadPoints() {
            try {
                const token = localStorage.getItem('auth_token');
                const response = await fetch('/api/admin/points', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const points = await response.json();
                    const tbody = document.getElementById('points-table-body');
                    
                    if (points.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">포인트 데이터가 없습니다.</td></tr>';
                    } else {
                        tbody.innerHTML = points.map(point => `
                            <tr>
                                <td>${point.user_name}</td>
                                <td>${point.current_points}</td>
                                <td>${point.total_earned}</td>
                                <td>${point.total_spent}</td>
                                <td>${new Date(point.last_updated).toLocaleDateString()}</td>
                                <td>
                                    <button class="action-btn" onclick="adjustPoints('${point.user_id}')">조정</button>
                                </td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('포인트 현황 로드 오류:', error);
            }
        }

        // 시스템 상태 로드
        async function loadSystemStatus() {
            try {
                const token = localStorage.getItem('auth_token');
                const response = await fetch('/api/admin/system', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const system = await response.json();
                    document.getElementById('mongodb-status').textContent = system.mongodb_status;
                    document.getElementById('gpt-status').textContent = system.gpt_status;
                    document.getElementById('server-status').textContent = system.server_status;
                }
            } catch (error) {
                console.error('시스템 상태 로드 오류:', error);
            }
        }

        // 뒤로가기
        function goBack() {
            window.location.href = '/dashboard';
        }

        // 사용자 편집
        function editUser(userId) {
            alert(`사용자 ${userId} 편집 기능이 곧 추가됩니다!`);
        }

        // 사용자 삭제
        function deleteUser(userId) {
            if (confirm('정말로 이 사용자를 삭제하시겠습니까?')) {
                alert(`사용자 ${userId} 삭제 기능이 곧 추가됩니다!`);
            }
        }

        // 포인트 조정
        function adjustPoints(userId) {
            alert(`사용자 ${userId} 포인트 조정 기능이 곧 추가됩니다!`);
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', async () => {
            const hasPermission = await checkAdminPermission();
            if (hasPermission) {
                loadOverview();
            }
        });
    </script>
</body>
</html>
