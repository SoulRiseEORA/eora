<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포인트 관리 - EORA AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .points-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .points-history {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            border-left: 4px solid #667eea;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }

        .earned {
            border-left-color: #28a745;
        }

        .spent {
            border-left-color: #dc3545;
        }
    </style>
</head>

<body>
    <!-- 네비게이션 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-brain"></i> EORA AI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">채팅</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/memory">기억</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/points">포인트</a>
                    </li>
                    {% if user and user.role == "admin" %}
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">관리자</a>
                    </li>
                    {% endif %}
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> {{ user.name if user else "사용자" }}
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/profile">프로필</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#" onclick="logout()">로그아웃</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">
                    <i class="fas fa-coins"></i> 포인트 관리
                </h1>
            </div>
        </div>

        <!-- 포인트 카드 -->
        <div class="row">
            <div class="col-md-4">
                <div class="points-card text-center">
                    <h3><i class="fas fa-coins"></i></h3>
                    <h2 id="currentPoints">0</h2>
                    <p>현재 포인트</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h3><i class="fas fa-plus-circle text-success"></i></h3>
                        <h2 id="totalEarned">0</h2>
                        <p>총 획득 포인트</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h3><i class="fas fa-minus-circle text-danger"></i></h3>
                        <h2 id="totalSpent">0</h2>
                        <p>총 사용 포인트</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 포인트 획득 방법 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-star"></i> 포인트 획득 방법</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-comments fa-2x text-primary"></i>
                                    <h6>대화 참여</h6>
                                    <p>+10 포인트</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-brain fa-2x text-success"></i>
                                    <h6>기억 저장</h6>
                                    <p>+20 포인트</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-calendar-check fa-2x text-warning"></i>
                                    <h6>일일 로그인</h6>
                                    <p>+5 포인트</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <i class="fas fa-share-alt fa-2x text-info"></i>
                                    <h6>친구 초대</h6>
                                    <p>+50 포인트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 포인트 사용 내역 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-history"></i> 포인트 사용 내역</h5>
                    </div>
                    <div class="card-body">
                        <div class="points-history" id="pointsHistory">
                            <!-- 포인트 내역이 여기에 로드됩니다 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 페이지 로드 시 포인트 정보 가져오기
        document.addEventListener('DOMContentLoaded', function () {
            loadPointsData();
        });

        async function loadPointsData() {
            try {
                const userId = '{{ user.user_id if user else "" }}';
                if (!userId) {
                    console.log('사용자 정보가 없습니다.');
                    return;
                }

                const response = await fetch(`/api/user/points/${userId}`);
                if (response.ok) {
                    const data = await response.json();

                    // 포인트 정보 업데이트
                    document.getElementById('currentPoints').textContent = data.current_points;
                    document.getElementById('totalEarned').textContent = data.total_earned;
                    document.getElementById('totalSpent').textContent = data.total_spent;

                    // 포인트 내역 표시
                    displayPointsHistory(data.history || []);
                } else {
                    console.error('포인트 정보를 가져오는데 실패했습니다.');
                }
            } catch (error) {
                console.error('포인트 데이터 로드 오류:', error);
            }
        }

        function displayPointsHistory(history) {
            const historyContainer = document.getElementById('pointsHistory');

            if (history.length === 0) {
                historyContainer.innerHTML = '<p class="text-muted text-center">포인트 사용 내역이 없습니다.</p>';
                return;
            }

            const historyHTML = history.map(item => `
                <div class="history-item ${item.type === 'earned' ? 'earned' : 'spent'}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${item.description}</strong>
                            <br>
                            <small class="text-muted">${new Date(item.timestamp).toLocaleString()}</small>
                        </div>
                        <div class="text-end">
                            <span class="badge ${item.type === 'earned' ? 'bg-success' : 'bg-danger'}">
                                ${item.type === 'earned' ? '+' : '-'}${item.points} 포인트
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');

            historyContainer.innerHTML = historyHTML;
        }

        async function logout() {
            if (confirm('정말로 로그아웃하시겠습니까?')) {
                try {
                    // 서버에 로그아웃 요청
                    const response = await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });

                    // 로컬 스토리지 정리
                    localStorage.removeItem('user_email');
                    localStorage.removeItem('user_name');
                    localStorage.removeItem('auto_login');
                    localStorage.removeItem('session_id');

                    // 홈페이지로 이동
                    window.location.href = '/';
                } catch (error) {
                    console.error('로그아웃 오류:', error);
                    // 오류 발생 시에도 로컬 정리 후 홈페이지로 이동
                    localStorage.removeItem('user_email');
                    localStorage.removeItem('user_name');
                    localStorage.removeItem('auto_login');
                    localStorage.removeItem('session_id');
                    window.location.href = '/';
                }
            }
        }
    </script>
</body>

</html>
